<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luxury Estate — Night Scene</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.2/dist/aframe-physics-system.min.js"></script>
  <script>
    AFRAME.registerComponent("pool-float", {});
    AFRAME.registerComponent("pool-buoyancy-manager", {
      init: function () {
        this.force = null;
        this.min = new THREE.Vector3(-5.4, -0.95, -25.9);
        this.max = new THREE.Vector3(5.4, 0.35, -18.1);
        this.strength = 55; this.drag = 2.8;
      },
      tick: function () {
        var CANNON = window.CANNON; if (!CANNON) return;
        if (!this.force) this.force = new CANNON.Vec3();
        var els = this.el.sceneEl.querySelectorAll("[pool-float]");
        for (var i = 0; i < els.length; i++) {
          var el = els[i], body = el.body; if (!body) continue;
          var p = el.object3D.position;
          var inW = p.x>=this.min.x&&p.x<=this.max.x&&p.y>=this.min.y&&p.y<=this.max.y&&p.z>=this.min.z&&p.z<=this.max.z;
          if (inW) {
            var sub = Math.min(1,(this.max.y-p.y)/(this.max.y-this.min.y+0.001));
            this.force.set(0,this.strength*body.mass*sub,0);
            body.applyForce(this.force,body.position);
            var f=1-0.04*this.drag*sub; body.velocity.x*=f; body.velocity.z*=f;
            f=1-0.06*sub; body.angularVelocity.x*=f; body.angularVelocity.y*=f; body.angularVelocity.z*=f;
          }
        }
      }
    });
    AFRAME.registerComponent("flicker", {
      init: function(){ this.t=0; },
      tick: function(t){ if(t-this.t<80)return; this.t=t; var s=0.9+Math.random()*0.22; this.el.setAttribute("scale",s+" "+(0.85+Math.random()*0.3)+" "+s); }
    });

    // Custom WASD that also responds to W/A/S/D properly
    AFRAME.registerComponent("custom-wasd", {
      schema: { speed: { default: 12 } },
      init: function () {
        this.keys = {};
        this.onKeyDown = this.onKeyDown.bind(this);
        this.onKeyUp   = this.onKeyUp.bind(this);
        window.addEventListener("keydown", this.onKeyDown);
        window.addEventListener("keyup",   this.onKeyUp);
        this.dir = new THREE.Vector3();
        this.camDir = new THREE.Vector3();
      },
      remove: function () {
        window.removeEventListener("keydown", this.onKeyDown);
        window.removeEventListener("keyup",   this.onKeyUp);
      },
      onKeyDown: function (e) { this.keys[e.code] = true; },
      onKeyUp:   function (e) { this.keys[e.code] = false; },
      tick: function (t, dt) {
        if (!dt) return;
        var k = this.keys;
        var forward = (k["KeyW"] || k["ArrowUp"])    ? 1 : 0;
        var back    = (k["KeyS"] || k["ArrowDown"])  ? 1 : 0;
        var left    = (k["KeyA"] || k["ArrowLeft"])  ? 1 : 0;
        var right   = (k["KeyD"] || k["ArrowRight"]) ? 1 : 0;
        if (!forward && !back && !left && !right) return;

        var cam = this.el.querySelector("[camera]") || this.el;
        cam.object3D.getWorldDirection(this.camDir);
        this.camDir.y = 0;
        this.camDir.normalize();

        var side = new THREE.Vector3();
        side.crossVectors(this.camDir, new THREE.Vector3(0,1,0)).normalize();

        var move = new THREE.Vector3();
        move.addScaledVector(this.camDir,  (forward - back));
        move.addScaledVector(side,         (right - left));
        move.normalize();

        var speed = this.data.speed * (dt / 1000);
        var pos = this.el.object3D.position;
        pos.x += move.x * speed;
        pos.z += move.z * speed;
      }
    });
  </script>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #hint {
      position: fixed; left: 12px; bottom: 12px; z-index: 10;
      max-width: 480px; font-size: 12px;
      color: rgba(255,255,255,0.93); text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      line-height: 1.7; background: rgba(0,0,0,0.65); padding: 10px 16px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
    }
    #hint kbd {
      display: inline-block; background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
      padding: 1px 6px; font-size: 11px; font-family: monospace;
    }
    #load-err {
      display: none; position: fixed; right: 12px; top: 12px; z-index: 11;
      max-width: 320px; padding: 12px 14px; font-size: 13px; line-height: 1.4;
      color: #fbe9e7; background: rgba(120,20,20,0.9); border-radius: 8px;
    }
  </style>
</head>
<body>

<div id="load-err"></div>

  physics="driver:cannon;gravity:-14;debug:false"
  pool-buoyancy-manager>

  <a-box position="0 0.145 -28.5"  width="58" height="0.04" depth="0.2" color="#222" roughness="0.8"></a-box>
  <a-box position="-14 0.145 -16"  width="0.2" height="0.04" depth="44" color="#222" roughness="0.8"></a-box>
  <a-box position="14 0.145 -16"   width="0.2" height="0.04" depth="44" color="#222" roughness="0.8"></a-box>

  <!-- ===================== PARKING ZONE ===================== -->

<script>
(function () {
  function onPlatform(x,z){ return Math.abs(x)<29&&z>-39&&z<5; }
  function inPool(x,z){ return Math.abs(x)<7&&z>-26&&z<-17; }

  // ── Stars ──────────────────────────────────────────────────────────
  var starsContainer = document.getElementById("stars");
  var starColors = ["#ffffff","#d0e8ff","#ffe8d0","#ffeedd","#cce0ff"];
  for(var s=0;s<320;s++){
    var star = document.createElement("a-sphere");
    var theta = Math.random()*Math.PI*2;
    var phi   = Math.random()*Math.PI*0.55;
    var r     = 180 + Math.random()*40;
    star.setAttribute("position", {
      x: r*Math.sin(phi)*Math.cos(theta),
      y: r*Math.cos(phi)+20,
      z: r*Math.sin(phi)*Math.sin(theta)
    });
    var sz  = 0.08+Math.random()*0.38;
    star.setAttribute("radius", sz);
    var col  = starColors[(Math.random()*starColors.length)|0];
    var glow = Math.random()<0.12 ? 0.5 : 0.15;
    star.setAttribute("material","color:"+col+";emissive:"+col+";emissiveIntensity:"+glow.toFixed(2)+";roughness:1");
    starsContainer.appendChild(star);
  }

  // ── Night vegetation ───────────────────────────────────────────────
  function addVegetation(container) {
    var greens=["#0a2006","#102808","#163010","#0c1a06","#1a3810"];
    var i,el,x,z,h,r,tries;
    for(i=0;i<90;i++){
      tries=0;
      do{ x=(Math.random()-0.5)*140; z=-10+(Math.random()-0.5)*90; tries++; }
      while((onPlatform(x,z)||inPool(x,z))&&tries<40);
      if(tries>=40)continue;
      h=0.3+Math.random()*0.75; r=0.06+Math.random()*0.18;
      el=document.createElement("a-entity");
      if(Math.random()<0.25){
        el.setAttribute("geometry",{primitive:"cone",radiusBottom:r*1.3,radiusTop:0,height:h*1.2,segmentsRadial:6});
      } else {
        el.setAttribute("geometry",{primitive:"cylinder",radius:r,height:h,segmentsRadial:6});
      }
      el.setAttribute("material",{color:greens[(Math.random()*greens.length)|0],roughness:1,metalness:0});
      el.setAttribute("position",{x:x,y:h/2+0.02,z:z});
      el.setAttribute("rotation",{y:(Math.random()*360)|0});
      el.setAttribute("shadow",{cast:true,receive:false});
      container.appendChild(el);
    }
    for(i=0;i<30;i++){
      tries=0;
      do{ x=(Math.random()-0.5)*140; z=-10+(Math.random()-0.5)*90; tries++; }
      while((onPlatform(x,z)||inPool(x,z))&&tries<40);
      if(tries>=40)continue;
      el=document.createElement("a-entity");
      el.setAttribute("geometry",{primitive:"box",width:0.3+Math.random()*0.38,height:0.15,depth:0.25+Math.random()*0.28});
      el.setAttribute("material",{color:"#444040",roughness:0.95,metalness:0.04});
      el.setAttribute("position",{x:x,y:0.08,z:z});
      el.setAttribute("rotation",{x:(Math.random()*18)|0,y:(Math.random()*360)|0,z:(Math.random()*14)|0});
      el.setAttribute("shadow",{cast:true});
      container.appendChild(el);
    }
  }

  // ── Flower beds ────────────────────────────────────────────────────
  function addFlowerBed(container, cx, cz, count, axis) {
    var cols=["#ff2040","#ff6800","#ffd000","#aa30ff","#ff50a0","#ffffff","#ff0030","#ff4070","#ffb000"];
    var emCols=["#880010","#882400","#886600","#660090","#881040","#666666","#880010","#882040","#886000"];
    for(var i=0;i<count;i++){
      var off=(i-(count-1)/2)*0.55;
      var fx=cx+(axis==="x"?off:0);
      var fz=cz+(axis==="z"?off:0);
      var stem=document.createElement("a-cylinder");
      stem.setAttribute("position",{x:fx,y:0.42,z:fz});
      stem.setAttribute("radius","0.03"); stem.setAttribute("height","0.5");
      stem.setAttribute("material","color:#143008;roughness:1");
      container.appendChild(stem);
      var idx=(Math.random()*cols.length)|0;
      var bloom=document.createElement("a-sphere");
      bloom.setAttribute("position",{x:fx,y:0.72,z:fz});
      bloom.setAttribute("radius","0.14");
      bloom.setAttribute("material","color:"+cols[idx]+";emissive:"+emCols[idx]+";emissiveIntensity:0.6;roughness:0.9");
      container.appendChild(bloom);
      var leaf=document.createElement("a-entity");
      leaf.setAttribute("geometry",{primitive:"sphere",radius:0.1});
      leaf.setAttribute("material",{color:"#143010",roughness:1});
      leaf.setAttribute("position",{x:fx+0.12,y:0.55,z:fz});
      container.appendChild(leaf);
    }
  }

  // ── BMW auto-scale ─────────────────────────────────────────────────
  function autoscaleCar(el, targetSize, yOffset) {
    el.addEventListener("model-loaded", function(){
      var mesh = el.getObject3D("mesh"); if (!mesh) return;
      var box = new THREE.Box3().setFromObject(mesh);
      var size = new THREE.Vector3(); box.getSize(size);
      var maxDim = Math.max(size.x, size.y, size.z);
      if (maxDim > 0) {
        var sc = targetSize / maxDim;
        el.setAttribute("scale", sc+" "+sc+" "+sc);
        setTimeout(function(){
          var b2 = new THREE.Box3().setFromObject(el.getObject3D("mesh"));
          var pos = el.getAttribute("position");
          el.setAttribute("position", {x:pos.x, y: yOffset - b2.min.y * sc, z:pos.z});
        }, 150);
      }
      document.querySelector("#hint").insertAdjacentHTML("beforeend"," ✅"+el.id.toUpperCase());
    });
    el.addEventListener("model-error", function(){
      var err = document.getElementById("load-err");
      err.style.display = "block";
      err.textContent = "Could not load " + el.id + ".gltf — ensure .gltf & .bin are beside the HTML file.";
    });
  }

  var sc = document.querySelector("a-scene");
  sc.addEventListener("loaded", function(){
    addVegetation(document.getElementById("vegetation"));
    addFlowerBed(document.getElementById("flowerbed-pool"), 0, -27.5, 16, "x");
    addFlowerBed(document.getElementById("flowerbed-h2"),   21, -26.6, 13, "x");
    addFlowerBed(document.getElementById("flowerbed-west"), -28, -22,  18, "z");
  });

  autoscaleCar(document.getElementById("bmw1"), 4.2, 0.14);
  autoscaleCar(document.getElementById("bmw2"), 4.2, 0.14);
  autoscaleCar(document.getElementById("bmw3"), 4.2, 0.14);

  ["bmw1","bmw2","bmw3"].forEach(function(id, i){
    var el = document.getElementById(id);
    var xPositions = [-17, -21, -25];
    el.addEventListener("model-loaded", function(){
      setTimeout(function(){
        var pos = el.getAttribute("position");
        el.setAttribute("position", {x: xPositions[i], y: pos.y, z: -3.5});
      }, 200);
    });
  });

  // Cabin
  var cabin = document.querySelector("#cabin");
  cabin.addEventListener("model-loaded", function(){
    document.querySelector("#hint").insertAdjacentHTML("beforeend"," ✅Cabin");
  });
  cabin.addEventListener("model-error", function(){
    var err = document.getElementById("load-err");
    err.style.display = "block";
    err.textContent = "Could not load house_extracted/cabin.glb. Serve via http://localhost, not file://.";
  });

  if (!window.location.protocol.startsWith("http")) {
    document.getElementById("load-err").style.display = "block";
    document.getElementById("load-err").textContent = "Opened as file:// — run a local server (e.g. http://localhost:8080/) for 3D models to load.";
  }
})();
</script>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luxury Estate — Night Scene</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.2/dist/aframe-physics-system.min.js"></script>
  <script>
    AFRAME.registerComponent("pool-float", {});
    AFRAME.registerComponent("pool-buoyancy-manager", {
      init: function () {
        this.force = null;
        this.min = new THREE.Vector3(-5.4, -0.95, -25.9);
        this.max = new THREE.Vector3(5.4, 0.35, -18.1);
        this.strength = 55; this.drag = 2.8;
      },
      tick: function () {
        var CANNON = window.CANNON; if (!CANNON) return;
        if (!this.force) this.force = new CANNON.Vec3();
        var els = this.el.sceneEl.querySelectorAll("[pool-float]");
        for (var i = 0; i < els.length; i++) {
          var el = els[i], body = el.body; if (!body) continue;
          var p = el.object3D.position;
          var inW = p.x>=this.min.x&&p.x<=this.max.x&&p.y>=this.min.y&&p.y<=this.max.y&&p.z>=this.min.z&&p.z<=this.max.z;
          if (inW) {
            var sub = Math.min(1,(this.max.y-p.y)/(this.max.y-this.min.y+0.001));
            this.force.set(0,this.strength*body.mass*sub,0);
            body.applyForce(this.force,body.position);
            var f=1-0.04*this.drag*sub; body.velocity.x*=f; body.velocity.z*=f;
            f=1-0.06*sub; body.angularVelocity.x*=f; body.angularVelocity.y*=f; body.angularVelocity.z*=f;
          }
        }
      }
    });
    AFRAME.registerComponent("flicker", {
      init: function(){ this.t=0; },
      tick: function(t){ if(t-this.t<80)return; this.t=t; var s=0.9+Math.random()*0.22; this.el.setAttribute("scale",s+" "+(0.85+Math.random()*0.3)+" "+s); }
    });

    // Custom WASD that also responds to W/A/S/D properly
    AFRAME.registerComponent("custom-wasd", {
      schema: { speed: { default: 12 } },
      init: function () {
        this.keys = {};
        this.onKeyDown = this.onKeyDown.bind(this);
        this.onKeyUp   = this.onKeyUp.bind(this);
        window.addEventListener("keydown", this.onKeyDown);
        window.addEventListener("keyup",   this.onKeyUp);
        this.dir = new THREE.Vector3();
        this.camDir = new THREE.Vector3();
      },
      remove: function () {
        window.removeEventListener("keydown", this.onKeyDown);
        window.removeEventListener("keyup",   this.onKeyUp);
      },
      onKeyDown: function (e) { this.keys[e.code] = true; },
      onKeyUp:   function (e) { this.keys[e.code] = false; },
      tick: function (t, dt) {
        if (!dt) return;
        var k = this.keys;
        var forward = (k["KeyW"] || k["ArrowUp"])    ? 1 : 0;
        var back    = (k["KeyS"] || k["ArrowDown"])  ? 1 : 0;
        var left    = (k["KeyA"] || k["ArrowLeft"])  ? 1 : 0;
        var right   = (k["KeyD"] || k["ArrowRight"]) ? 1 : 0;
        if (!forward && !back && !left && !right) return;

        var cam = this.el.querySelector("[camera]") || this.el;
        cam.object3D.getWorldDirection(this.camDir);
        this.camDir.y = 0;
        this.camDir.normalize();

        var side = new THREE.Vector3();
        side.crossVectors(this.camDir, new THREE.Vector3(0,1,0)).normalize();

        var move = new THREE.Vector3();
        move.addScaledVector(this.camDir,  (forward - back));
        move.addScaledVector(side,         (right - left));
        move.normalize();

        var speed = this.data.speed * (dt / 1000);
        var pos = this.el.object3D.position;
        pos.x += move.x * speed;
        pos.z += move.z * speed;
      }
    });

  <!-- Bar stools -->
  <a-cylinder position="-3.2 0.55 -30.7" radius="0.2" height="0.06" color="#2a1808" roughness="0.8" shadow="cast:true"></a-cylinder>

  </a-entity>

</a-scene>

<script>
(function () {
  function onPlatform(x,z){ return Math.abs(x)<29&&z>-39&&z<5; }
  function inPool(x,z){ return Math.abs(x)<7&&z>-26&&z<-17; }

  // ── Stars ──────────────────────────────────────────────────────────
  var starsContainer = document.getElementById("stars");
  var starColors = ["#ffffff","#d0e8ff","#ffe8d0","#ffeedd","#cce0ff"];
  for(var s=0;s<320;s++){
    var star = document.createElement("a-sphere");
    var theta = Math.random()*Math.PI*2;
    var phi   = Math.random()*Math.PI*0.55;
    var r     = 180 + Math.random()*40;
    star.setAttribute("position", {
      x: r*Math.sin(phi)*Math.cos(theta),
      y: r*Math.cos(phi)+20,
      z: r*Math.sin(phi)*Math.sin(theta)
    });
    var sz  = 0.08+Math.random()*0.38;
    star.setAttribute("radius", sz);
    var col  = starColors[(Math.random()*starColors.length)|0];
    var glow = Math.random()<0.12 ? 0.5 : 0.15;
    star.setAttribute("material","color:"+col+";emissive:"+col+";emissiveIntensity:"+glow.toFixed(2)+";roughness:1");
    starsContainer.appendChild(star);
  }

  // ── Night vegetation ───────────────────────────────────────────────
  function addVegetation(container) {
    var greens=["#0a2006","#102808","#163010","#0c1a06","#1a3810"];
    var i,el,x,z,h,r,tries;
    for(i=0;i<90;i++){
      tries=0;
      do{ x=(Math.random()-0.5)*140; z=-10+(Math.random()-0.5)*90; tries++; }
      while((onPlatform(x,z)||inPool(x,z))&&tries<40);
      if(tries>=40)continue;
      h=0.3+Math.random()*0.75; r=0.06+Math.random()*0.18;
      el=document.createElement("a-entity");
      if(Math.random()<0.25){
        el.setAttribute("geometry",{primitive:"cone",radiusBottom:r*1.3,radiusTop:0,height:h*1.2,segmentsRadial:6});
      } else {
        el.setAttribute("geometry",{primitive:"cylinder",radius:r,height:h,segmentsRadial:6});
      }
      el.setAttribute("material",{color:greens[(Math.random()*greens.length)|0],roughness:1,metalness:0});
      el.setAttribute("position",{x:x,y:h/2+0.02,z:z});
      el.setAttribute("rotation",{y:(Math.random()*360)|0});
      el.setAttribute("shadow",{cast:true,receive:false});
      container.appendChild(el);
    }
    for(i=0;i<30;i++){
      tries=0;
      do{ x=(Math.random()-0.5)*140; z=-10+(Math.random()-0.5)*90; tries++; }
      while((onPlatform(x,z)||inPool(x,z))&&tries<40);
      if(tries>=40)continue;
      el=document.createElement("a-entity");
      el.setAttribute("geometry",{primitive:"box",width:0.3+Math.random()*0.38,height:0.15,depth:0.25+Math.random()*0.28});
      el.setAttribute("material",{color:"#444040",roughness:0.95,metalness:0.04});
      el.setAttribute("position",{x:x,y:0.08,z:z});
      el.setAttribute("rotation",{x:(Math.random()*18)|0,y:(Math.random()*360)|0,z:(Math.random()*14)|0});
      el.setAttribute("shadow",{cast:true});
      container.appendChild(el);
    }
  }

  // ── Flower beds ────────────────────────────────────────────────────
  function addFlowerBed(container, cx, cz, count, axis) {
    var cols=["#ff2040","#ff6800","#ffd000","#aa30ff","#ff50a0","#ffffff","#ff0030","#ff4070","#ffb000"];
    var emCols=["#880010","#882400","#886600","#660090","#881040","#666666","#880010","#882040","#886000"];
    for(var i=0;i<count;i++){
      var off=(i-(count-1)/2)*0.55;
      var fx=cx+(axis==="x"?off:0);
      var fz=cz+(axis==="z"?off:0);
      var stem=document.createElement("a-cylinder");
      stem.setAttribute("position",{x:fx,y:0.42,z:fz});
      stem.setAttribute("radius","0.03"); stem.setAttribute("height","0.5");
      stem.setAttribute("material","color:#143008;roughness:1");
      container.appendChild(stem);
      var idx=(Math.random()*cols.length)|0;
      var bloom=document.createElement("a-sphere");
      bloom.setAttribute("position",{x:fx,y:0.72,z:fz});
      bloom.setAttribute("radius","0.14");
      bloom.setAttribute("material","color:"+cols[idx]+";emissive:"+emCols[idx]+";emissiveIntensity:0.6;roughness:0.9");
      container.appendChild(bloom);
      var leaf=document.createElement("a-entity");
      leaf.setAttribute("geometry",{primitive:"sphere",radius:0.1});
      leaf.setAttribute("material",{color:"#143010",roughness:1});
      leaf.setAttribute("position",{x:fx+0.12,y:0.55,z:fz});
      container.appendChild(leaf);
    }
  }

  // ── BMW auto-scale ─────────────────────────────────────────────────
  function autoscaleCar(el, targetSize, yOffset) {
    el.addEventListener("model-loaded", function(){
      var mesh = el.getObject3D("mesh"); if (!mesh) return;
      var box = new THREE.Box3().setFromObject(mesh);
      var size = new THREE.Vector3(); box.getSize(size);
      var maxDim = Math.max(size.x, size.y, size.z);
      if (maxDim > 0) {
        var sc = targetSize / maxDim;
        el.setAttribute("scale", sc+" "+sc+" "+sc);
        setTimeout(function(){
          var b2 = new THREE.Box3().setFromObject(el.getObject3D("mesh"));
          var pos = el.getAttribute("position");
          el.setAttribute("position", {x:pos.x, y: yOffset - b2.min.y * sc, z:pos.z});
        }, 150);
      }
      document.querySelector("#hint").insertAdjacentHTML("beforeend"," ✅"+el.id.toUpperCase());
    });
    el.addEventListener("model-error", function(){
      var err = document.getElementById("load-err");
      err.style.display = "block";
      err.textContent = "Could not load " + el.id + ".gltf — ensure .gltf & .bin are beside the HTML file.";
    });
  }

  var sc = document.querySelector("a-scene");
  sc.addEventListener("loaded", function(){
    addVegetation(document.getElementById("vegetation"));
    addFlowerBed(document.getElementById("flowerbed-pool"), 0, -27.5, 16, "x");
    addFlowerBed(document.getElementById("flowerbed-h2"),   21, -26.6, 13, "x");
    addFlowerBed(document.getElementById("flowerbed-west"), -28, -22,  18, "z");
  });

  autoscaleCar(document.getElementById("bmw1"), 4.2, 0.14);
  autoscaleCar(document.getElementById("bmw2"), 4.2, 0.14);
  autoscaleCar(document.getElementById("bmw3"), 4.2, 0.14);

  ["bmw1","bmw2","bmw3"].forEach(function(id, i){
    var el = document.getElementById(id);
    var xPositions = [-17, -21, -25];
    el.addEventListener("model-loaded", function(){
      setTimeout(function(){
        var pos = el.getAttribute("position");
        el.setAttribute("position", {x: xPositions[i], y: pos.y, z: -3.5});
      }, 200);
    });
  });

  // Cabin
  var cabin = document.querySelector("#cabin");
  cabin.addEventListener("model-loaded", function(){
    document.querySelector("#hint").insertAdjacentHTML("beforeend"," ✅Cabin");
  });
  cabin.addEventListener("model-error", function(){
    var err = document.getElementById("load-err");
    err.style.display = "block";
    err.textContent = "Could not load house_extracted/cabin.glb. Serve via http://localhost, not file://.";
  });

  if (!window.location.protocol.startsWith("http")) {
    document.getElementById("load-err").style.display = "block";
    document.getElementById("load-err").textContent = "Opened as file:// — run a local server (e.g. http://localhost:8080/) for 3D models to load.";
  }
})();
</script>
</body>
</html>
